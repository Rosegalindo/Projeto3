<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amakha Paris - Perfumaria</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
}

/* FUNDO */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    background-image:url("img/Tela_Main.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* CONTEÚDO TEXTO */
.conteudo{
    position:absolute;
    left:5%;
    top:47%;
    color:white;
    max-width:350px;
}

/* TÍTULO */
.titulo{
    font-family:'Playfair Display', serif;
    text-align: center;
    font-size:30px;
    font-weight:700;
    margin-bottom:1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

/* SUBTÍTULO */
.subtitulo{
    font-family:'Poppins', sans-serif;
    font-size:18px;
    margin-bottom:10px;
    color:#ddd;
}

/* TEXTO DESCRIÇÃO */
.descricao{
    font-family:'Poppins', sans-serif;
    font-size:15px;
    text-align: center;
    text-align:center;
    line-height:1.6;
    color:#ccc;
}

/* BOTÃO */
.btn{
    position:absolute;
    left:30%;
    bottom:10%;
    transform:translateX(-50%);
    background:#d4af37;
    color:#000;
    padding:16px 40px;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#fff;
}

/* RODAPÉ */
footer{
    position:absolute;
    bottom:0;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#fff;
    padding:10px;
}

footer a{
    color:#ffd700;
    text-decoration:none;
}

/* ===== TABLETS ===== */
@media (max-width:1024px){
    .hero{
        background-position:10% center;
    }
}

/* ===== CELULAR GRANDE ===== */
@media (max-width:768px){
    .hero{
        background-image:url("img/Tela_Main.png");
        background-size:cover;
        background-position:15% center;
    }

    .btn{
        bottom:15%;
        padding:14px 30px;
        font-size:16px;
    }
}

/* ===== CELULAR PEQUENO ===== */
@media (max-width:300px){
    .hero{
        background-position:20% center;
    }

    .btn{
        bottom:18%;
        font-size:14px;
        padding:12px 25px;
    }
}
</style>
</head>

<body>
    <section class="hero">

    <div class="conteudo">
        <div class="titulo">PERFUMARIA</div>

        <div class="subtitulo">
            MINIATURAS DE PERFUMES
        </div>

        <div class="descricao">
            Marca brasileira<br> 
            de<br>
            cosméticos e perfumaria
        </div>
    </div>

    <a href="galeria.html" class="btn">PERFUMES</a>

</section>

<!-- BOTÃO -->
    <a href="galeria.html" class="btn">
        PRODUTOS
    </a>

    <!-- RODAPÉ -->
    <footer>
        Criado por Solver - 
        <a href="https://www.instagram.com/solver.design/" target="_blank">
            Mais informações clique aqui: @solver.design
        </a>
    </footer>
</body>
</html>
