<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amakha Paris - Perfumaria</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
}

html, body{
    overflow:hidden; /* 👈 remove scroll */
    margin:0;
    padding:0;
    background:#000; /* 👈 remove qualquer cinza */
}

/* FUNDO */
.hero{
    position:relative;
    width:100%;
    height:100vh;   /* 👈 volta fixo */
    overflow:hidden;
}

/* IMAGEM */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%; /* 👈 sobe a imagem */
    z-index:1;
}

/* CONTEÚDO TEXTO */
.conteudo{
    position:absolute;
    left:17.9%;
    top:59.9%;
    transform:translateY(-50%);
    color:white;
    max-width:420px;
}

/* TÍTULO */
.titulo{
    font-family:'Playfair Display', serif;
    text-align: center;
    font-size:30px;
    font-weight:700;
    margin-bottom:1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

/* SUBTÍTULO */
.subtitulo{
    font-family:'Poppins', sans-serif;
    font-size:18px;
    margin-bottom:10px;
    color:#ddd;
}

/* TEXTO DESCRIÇÃO */
.descricao{
    font-family:'Poppins', sans-serif;
    font-size:15px;
    text-align: center;
    text-align:center;
    line-height:1.6;
    color:#ccc;
}

.conteudo,
.btn, footer{
    position:absolute;
    z-index:2;
}

/* BOTÃO */
.btn{
    position:absolute;
    left:24.6%;
    bottom:15%;
    transform:translateX(-50%);
    background:#d4af37;
    color:#000;
    padding:16px 40px;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#fff;
}

/* RODAPÉ */
footer{
    bottom:10px;
    left:24%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    font-size:12px;
    color:#fff;
}

footer a{
    color:#ffd700;
    text-decoration:none;
}

/* ===== TABLETS ===== */
@media (max-width:1024px){
    .hero{
        background-position:10% center;
    }
}

/* ===== CELULAR ===== */
@media (max-width:768px){
    .bg{
        background-image:url("img/Tela_Main.png");
        object-position:65% center; /* 👈 centraliza modelo */
    }

    .conteudo{
        left: 3%;
        top: 50%;
        transform: translateY(-50%);
        max-width: 260px;
        text-align: left;
    }

    .btn{
        bottom:22%;
        left:30%;
        transform:translateX(-50%);
    }
}
</style>
</head>

<body>

<section class="hero">

    <img src="img/tela_big.png" class="bg">

    <div class="conteudo">
        <div class="titulo">PERFUMARIA</div>

        <div class="subtitulo">
            MINIATURAS DE PERFUMES
        </div>

        <div class="descricao">
            Marca brasileira<br> 
            de<br>
            cosméticos e perfumaria
        </div>
    </div>
    <a href="galeria.html" class="btn">PRODUTOS</a>

    <footer>
        Criado por Solver - 
        <a href="https://www.instagram.com/solver.design/" target="_blank">
            Mais informações clique aqui: @solver.design
        </a>
    </footer>
    </section>

</body>
</html>
